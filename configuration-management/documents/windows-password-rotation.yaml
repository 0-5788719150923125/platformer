---
schemaVersion: '2.2'
description: 'Rotate local Administrator password and store in Parameter Store'
parameters:
  ParameterStorePrefix:
    type: String
    description: 'Parameter Store path prefix for storing passwords'
    default: '/password-rotation'
mainSteps:
  - action: 'aws:runPowerShellScript'
    name: 'rotatePassword'
    precondition:
      StringEquals:
        - platformType
        - Windows
    inputs:
      runCommand:
        - |
          $ErrorActionPreference = 'Stop'

          try {
              Write-Output "Starting password rotation for local Administrator account..."

              # Generate secure random password (24 characters)
              # Meets Windows complexity requirements: uppercase, lowercase, digits, special chars
              Add-Type -AssemblyName System.Web
              $passwordLength = 24
              $password = [System.Web.Security.Membership]::GeneratePassword($passwordLength, 8)

              Write-Output "Generated new secure password"

              # Get local Administrator account and set new password
              $admin = [ADSI]"WinNT://./Administrator,user"
              $admin.SetPassword($password)

              # Ensure Administrator account is enabled
              $admin.UserFlags.Value = $admin.UserFlags.Value -band (-bnot 0x0002)
              $admin.SetInfo()

              Write-Output "Successfully set new Administrator password"

              # Get instance metadata
              $token = Invoke-RestMethod -Uri "http://169.254.169.254/latest/api/token" -Method PUT -Headers @{"X-aws-ec2-metadata-token-ttl-seconds" = "21600"}
              $instanceId = Invoke-RestMethod -Uri "http://169.254.169.254/latest/meta-data/instance-id" -Headers @{"X-aws-ec2-metadata-token" = $token}
              $region = Invoke-RestMethod -Uri "http://169.254.169.254/latest/meta-data/placement/region" -Headers @{"X-aws-ec2-metadata-token" = $token}

              Write-Output "Instance ID: $instanceId"
              Write-Output "Region: $region"

              # Store password in Parameter Store
              $parameterName = "{{ ParameterStorePrefix }}/$instanceId/administrator"
              $description = "Local Administrator password for $instanceId (rotated $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') UTC)"

              Write-Output "Storing password in Parameter Store: $parameterName"

              # Import AWS PowerShell module (try new modular version first, fall back to legacy monolithic)
              if (Get-Module -ListAvailable -Name AWS.Tools.SimpleSystemsManagement) {
                  Import-Module AWS.Tools.SimpleSystemsManagement -ErrorAction Stop
                  Write-Output "Using AWS.Tools.SimpleSystemsManagement module"
              } elseif (Get-Module -ListAvailable -Name AWSPowerShell) {
                  Import-Module AWSPowerShell -ErrorAction Stop
                  Write-Output "Using AWSPowerShell module"
              } else {
                  throw "No AWS PowerShell module found (tried AWS.Tools.SimpleSystemsManagement and AWSPowerShell)"
              }

              # Store password in Parameter Store using PowerShell cmdlet
              Write-SSMParameter `
                  -Name $parameterName `
                  -Value $password `
                  -Description $description `
                  -Type SecureString `
                  -Overwrite $true `
                  -Region $region `
                  -Force | Out-Null

              Write-Output "Successfully stored password in Parameter Store"
              Write-Output "Password rotation completed successfully for $instanceId"

              exit 0

          } catch {
              Write-Output "ERROR: Password rotation failed"
              Write-Output "Exception: $($_.Exception.Message)"
              Write-Output "Stack Trace: $($_.ScriptStackTrace)"
              exit 1
          }
