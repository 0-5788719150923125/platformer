---
schemaVersion: '2.2'
description: 'IMS Universal Post-Install Hook for Linux - Validates system health after installation'
parameters:
  ScriptBucket:
    type: String
    description: 'S3 bucket containing hook scripts'
    default: '${default_bucket}'
  ScriptPrefix:
    type: String
    description: 'S3 prefix for hook scripts'
    default: 'hooks/linux/post'
mainSteps:
  - action: 'aws:runShellScript'
    name: 'ExecutePostInstallHooks'
    inputs:
      runCommand:
        - |
          #!/bin/bash
          set -e

          echo "=== IMS Universal Post-Install Hook System ==="
          echo "Starting post-install validation checks..."
          echo ""

          HOOK_DIR="/tmp/org-hooks/post"
          mkdir -p "$HOOK_DIR"

          # Download all post-install scripts from S3
          echo "Downloading hook scripts from s3://{{ScriptBucket}}/{{ScriptPrefix}}/"
          aws s3 sync "s3://{{ScriptBucket}}/{{ScriptPrefix}}/" "$HOOK_DIR/" --quiet

          if [ ! "$(ls -A $HOOK_DIR)" ]; then
            echo "WARNING: No hook scripts found in S3 - continuing without hooks"
            exit 0
          fi

          chmod +x "$HOOK_DIR"/*.sh

          # Execute scripts in alphabetical order (numeric prefix controls order)
          FAILED=0
          WARNING=0
          for script in $(ls "$HOOK_DIR"/*.sh 2>/dev/null | sort); do
            echo ""
            echo "--- Executing: $(basename $script) ---"

            if bash "$script"; then
              echo "--- $(basename $script): SUCCESS ---"
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 2 ]; then
                echo "--- $(basename $script): WARNING (exit 2) - continuing ---"
                WARNING=1
              else
                echo "--- $(basename $script): FAILED (exit $EXIT_CODE) ---"
                FAILED=1
                break
              fi
            fi
          done

          # Cleanup
          rm -rf "/tmp/org-hooks"

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "=== Post-install validation checks FAILED - marking instance as unhealthy ==="
            exit 1
          fi

          if [ $WARNING -eq 1 ]; then
            echo ""
            echo "=== Post-install validation checks completed with WARNINGS - continuing ==="
          else
            echo ""
            echo "=== Post-install validation checks completed successfully ==="
          fi

          exit 0
