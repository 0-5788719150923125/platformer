# Observability stack - LGTM (Loki, Grafana, Tempo, Mimir)
# Deploys an EKS cluster with Loki + Grafana, plus Alloy agents on EC2 instances
services:
  # Self-contained observability stack
  observability:
    # EKS cluster definition (emitted as compute_class_requests)
    compute:
      type: eks
      version: "1.34"
      endpoint_public_access: true
      addons:
        - eks-pod-identity-agent
        - aws-ebs-csi-driver
      node_groups:
        default:
          instance_types: ["t3.large"]
          min_size: 1
          max_size: 3
          desired_size: 1
      description: "EKS cluster for LGTM observability stack"

    components:
      loki:
        mode: SingleBinary
        retention_days: 30
      grafana:
        enabled: true
      tempo:
        enabled: true
        retention_days: 30
      mimir:
        enabled: true
        mode: SingleBinary
        retention_days: 30

    agent:
      log_paths:
        - "/var/log/messages"
        - "/var/log/secure"
        - "/var/log/cloud-init-output.log"
      targeting:
        mode: managed
