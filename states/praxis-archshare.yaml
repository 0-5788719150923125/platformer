# Archshare EKS POC State Fragment
# Proof of concept deployment for Archshare medical imaging platform using EKS
# Supports multiple tenants with shared infrastructure

matrix:
  tenants:
    test:
      entitlements: [archshare.archshare]

services:
  # Archshare deployments - each key is a named deployment containing all infrastructure
  # Deployment name becomes the compute class name for entitlement resolution
  archshare:
    archshare:
      # Compute: EKS cluster shared, namespaces per tenant
      # Helm charts and secrets managed by archshare module
      compute:
        type: eks  # Native Kubernetes deployment
        version: "1.34"  # EKS cluster version

        # API endpoint access configuration
        endpoint_private_access: true
        endpoint_public_access: true  # Enable for POC access (restrict in production)

        # Node groups for workload execution
        node_groups:
          archshare:
            instance_types:
              - "m6a.large"  # Right-sized for containerized workloads
            min_size: 1
            max_size: 3
            desired_size: 2  # 2 nodes for availability
            labels:
              workload: "archshare"

        # No applications array needed - archshare module generates Helm requests automatically

      # RDS Aurora PostgreSQL (two clusters per tenant: services + storage)
      rds:
        services:
          engine_version: "15.15"  # Latest stable Aurora PostgreSQL 15.x
          instance_class: db.t4g.medium
          instances: 1  # Dev: single instance (prod would be 2+)
        storage:
          engine_version: "15.15"  # Latest stable Aurora PostgreSQL 15.x
          instance_class: db.t4g.medium
          instances: 1

      # ElastiCache (Valkey for Redis compatibility + Memcached)
      # Three clusters per tenant: services cache, storage cache, shared memcached
      elasticache:
        services:
          engine: valkey
          engine_version: "8.0"
          node_type: cache.t4g.micro
          num_cache_nodes: 1
          transit_encryption_enabled: false  # Dev: disabled for simplicity
        storage:
          engine: valkey
          engine_version: "8.0"
          node_type: cache.t4g.micro
          num_cache_nodes: 1
          transit_encryption_enabled: false
        memcached:
          engine: memcached
          engine_version: "1.6.22"
          node_type: cache.t4g.micro
          num_cache_nodes: 1
          transit_encryption_enabled: false  # Memcached doesn't support TLS in AWS

      # ECR registry for Docker images (cross-account access configured via IAM)
      ecr_registry: "777777777777.dkr.ecr.us-east-2.amazonaws.com"
