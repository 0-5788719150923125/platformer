---
# Install Python and Pip
# This is a dependency playbook that should be imported by other playbooks that need Python/pip
# Usage: import_playbook: ../python/playbook.yml

- name: Install Python and Pip
  hosts: linux
  become: yes
  tasks:
    - name: Detect OS family
      ansible.builtin.setup:
        gather_subset:
          - '!all'
          - '!min'
          - 'distribution'

    - name: Install Python, pip, and venv (Amazon Linux 2023)
      ansible.builtin.dnf:
        name:
          - python3
          - python3-pip
          - python3-virtualenv
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install Python, pip, and venv (Ubuntu/Debian)
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"
