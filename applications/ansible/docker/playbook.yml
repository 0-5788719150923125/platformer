---
# Ansible playbook to install Docker Engine and Docker Compose on Amazon Linux 2023
# This playbook ensures Docker is installed, configured, and running
# Self-healing: runs every 30 minutes via Ansible controller to ensure Docker stays installed

- name: Install and configure Docker
  hosts: linux
  become: yes
  vars:
    docker_compose_version: "2.29.0"

  tasks:
    - name: Install Docker package
      ansible.builtin.dnf:
        name: docker
        state: present
      register: docker_install

    - name: Enable Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Check if Docker Compose binary is installed
      ansible.builtin.stat:
        path: /usr/local/bin/docker-compose
      register: compose_binary

    - name: Download Docker Compose V2 binary
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-Linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: not compose_binary.stat.exists or docker_install.changed

    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/libexec/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Create symlink for docker compose plugin
      ansible.builtin.file:
        src: /usr/local/bin/docker-compose
        dest: /usr/libexec/docker/cli-plugins/docker-compose
        state: link

    - name: Verify Docker Compose is available
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false
      failed_when: compose_version.rc != 0

    - name: Verify Docker is running
      ansible.builtin.command: docker info
      register: docker_info
      changed_when: false
      failed_when: docker_info.rc != 0
