# Test: Patch management with baselines and maintenance windows
matrix:
  tenants:
    bravo:
      entitlements: [compute.*]

services:
  configuration-management:
    patch_management:
      baselines:
        rocky9-test:
          operating_system: "ROCKY_LINUX"
          approved_patches_compliance_level: "HIGH"
          approval_rules:
            - approve_after_days: 0
              compliance_level: "HIGH"
              enable_non_security: false
              patch_filter:
                severity: ["Critical", "Important"]
          classes: ["rocky-linux"]

      maintenance_windows:
        rocky9-weekly:
          baseline: rocky9-test
          schedule: "rate(30 minutes)"
          duration: 4
          cutoff: 1

  compute:
    rocky-linux:
      type: ec2
      ami_filter: "Rocky-9-EC2-Base-9.*x86_64"
      ami_owner: "792107900819"
      instance_type: "t3.micro"
      count: 1
