# Integration test: compute with custom VPC
matrix:
  tenants:
    bravo:
      entitlements: [compute.*]
    rab:
      entitlements: [compute.*]

services:
  networks:
    shared:
      allocation_method: "deterministic"
      az_count: 2
      enable_nat_gateway: true
      subnet_topology:
        private:
          cidr_newbits: 8
          offset: 0
          nat_gateway: true
        public:
          cidr_newbits: 10
          offset: 100
          internet_gateway: true
          map_public_ip_on_launch: true

  compute:
    rocky-linux:
      type: ec2
      network_name: shared
      ami_filter: "Rocky-9-EC2-Base-9.*x86_64"
      ami_owner: "792107900819"
      instance_type: "t3.micro"
      count: 1
