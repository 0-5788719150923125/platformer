services:
  secrets:
    archbot/atlassian_pat:
      source_secret_id: "prod/archbot"
      source_provider: "prod"
      json_key: "ATLASSIAN_TOKEN"
      description: "Atlassian API token for archbot"
    archbot/devin_api_key:
      source_secret_id: "prod/archbot"
      source_provider: "prod"
      json_key: "DEVIN_TOKEN"
      description: "Devin API key for archbot"

  archbot:
    atlassian_base_url: "https://example.atlassian.net"
    atlassian_email: "test@example.com"
    project_keys:
      - TEST
    ai_backend: "bedrock"
    knowledge_base_enabled: true
    embedding_model_id: "amazon.titan-embed-text-v2:0"
    kb_max_results: 5
    kb_chunking_strategy: "SEMANTIC"
    kb_document_paths:
      - "../environment/prod/org-root"
