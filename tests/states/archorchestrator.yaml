# Test: ArchOrchestrator with ECS services, RDS, and S3
matrix:
  tenants:
    test:
      entitlements: [archorchestrator.*]

services:
  archorchestrator:
    dev1:
      ecs:
        clario:
          cpu: 2048
          memory: 8192
          image: "clario-5.2.0-alpha.0.20260126002129765_dev"
          desired_count: 1
          port: 30000
          protocol: HTTPS
        router:
          cpu: 1024
          memory: 2048
          image: "saas-router-5.2.0-alpha.0.20250818214012210_dev"
          desired_count: 1
          port: 8080
          architecture: ARM64
          protocol: HTTPS

      ecr_source_profile: acme-clario-cloud-dev
      ecr_source_account_id: "666666666666"
      ecr_source_region: us-east-1
      ecr_source_repo: saas-us-east-1-deploymentecrrepository-7dc3wtgyh2tn

      rds:
        engine: sqlserver-se
        engine_version: "15.00"
        instance_class: db.m5.xlarge
        allocated_storage: 200
        multi_az: false
        deletion_protection: false
        backup_retention_period: 1

      s3:
        - purpose: messaging
          lifecycle_days: 30
        - purpose: configuration
        - purpose: documents
