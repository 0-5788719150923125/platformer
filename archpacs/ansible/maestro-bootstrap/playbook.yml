---
# Maestro Bootstrap Playbook
# Installs Maestro automation tool and runs PACS new_site_install on Rocky Linux 8
#
# Executed on all PACS instances via SSM (AWS-ApplyAnsiblePlaybooks).
# The ORCHESTRATOR param differentiates behavior:
#   - Runner nodes:      Set up SSH trust, wait for orchestrator to install Maestro
#   - Orchestrator node: Set up SSH trust, discover fleet, generate distribute.cfg,
#                        install Maestro on all nodes, run new_site_install
#
# Prerequisites (installed via user-data before this playbook runs):
#   - SSM agent (install-ssm-agent.sh)
#   - AWS CLI v2 (install-aws-cli.sh)
#   - Python 3.9 (install-python39.sh)
#
# SSH keypair and deploy password are pre-generated by Terraform and stored in SSM,
# so all nodes can retrieve them on the very first playbook run.
#
# Reference: https://example.atlassian.net/wiki/spaces/SREL/pages/1242169423/Maestro+Automation

- name: Maestro Bootstrap for ArchPACS
  hosts: linux
  become: yes

  vars:
    # Rocky Linux 8 ships Python 3.6 (platform-python) which is too old for Ansible 2.17+ modules.
    # Python 3.9 is installed via user-data bootstrap (install-python39.sh) from AppStream.
    ansible_python_interpreter: /usr/bin/python3.9

    # Variables passed via AWS-ApplyAnsiblePlaybooks ExtraVariables
    server_type: "{{ SERVER_TYPE | default('') }}"
    is_orchestrator: "{{ ORCHESTRATOR | default('false') | lower == 'true' }}"
    pacs_version: "{{ PACS_VERSION | default('5-8-1-R32') }}"
    deploy_namespace: "{{ NAMESPACE | default('') }}"
    deployment_name: "{{ DEPLOYMENT_NAME | default('') }}"
    tenant: "{{ TENANT | default('') }}"
    aws_region: "{{ AWS_REGION | default('us-east-2') }}"

    # Maestro paths and RPM
    maestro_base_dir: "/opt/vendor/share/maestro-automation"
    maestro_bin_dir: "/opt/vendor/share/maestro-automation/python/bin"
    maestro_rpm_filename: "vendor-maestro-automation-1.0.2-P1.noarch.rpm"
    playbooks_bucket: "{{ ANSIBLE_PLAYBOOKS_BUCKET | default('') }}"
    distribute_cfg_path: "/tmp/distribute.cfg"
    ssh_key_path: "/root/.ssh/id_rsa"

    # Completion markers
    maestro_installed_marker: "/var/log/PACS/.maestro-installed"
    pacs_installed_marker: "/var/log/PACS/.pacs-installed"

    # ServerType-to-Feature mappings (from Maestro distribute.cfg reference)
    server_type_features:
      ModalityWithDiskmon: "Feature_Base, Feature_PrefDefaults, Feature_Sybase, Feature_LegacyDatabases, Feature_IpmonLocal, Feature_LocalAuditService, Feature_Acquisition, Feature_AutoRoute, Feature_ImageCStore, Feature_ValidImageLocation, Feature_UpdateMasterDatabase, Feature_ImageSpaceManagement"
      DicomMasterService: "Feature_Base, Feature_PrefDefaults, Feature_Sybase, Feature_LegacyDatabases, Feature_IpmonLocal, Feature_LocalAuditService, Feature_DicomMasterService"
      DistributionServer: "Feature_Base, Feature_PrefDefaults, Feature_Sybase, Feature_LegacyDatabases, Feature_IpmonLocal, Feature_LocalAuditService, Feature_DistributionServer"

  tasks:
    # ── Validation ──────────────────────────────────────────────────────

    - name: Display deployment information
      ansible.builtin.debug:
        msg: |
          Maestro Bootstrap for ArchPACS
          Server Type: {{ server_type }}
          Orchestrator: {{ is_orchestrator }}
          PACS Version: {{ pacs_version }}
          Deployment: {{ deployment_name }}
          Tenant: {{ tenant }}
          Namespace: {{ deploy_namespace }}
          Hostname: {{ ansible_hostname }}

    - name: Validate required parameters
      ansible.builtin.fail:
        msg: "{{ item.name }} parameter is required"
      when: item.value == ""
      loop:
        - { name: "SERVER_TYPE", value: "{{ server_type }}" }
        - { name: "DEPLOYMENT_NAME", value: "{{ deployment_name }}" }

    # ── Prerequisites ───────────────────────────────────────────────────

    - name: Create PACS directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /usr/local/PACS
        - /usr/local/tools
        - /usr/local/tools/control_files
        - /opt/imsdb
        - /var/log/PACS

    - name: Ensure SSM agent is running
      ansible.builtin.systemd:
        name: amazon-ssm-agent
        state: started
        enabled: yes
      ignore_errors: yes

    - name: Ensure python3 RPM package is installed (satisfies RPM dependencies for vendor packages)
      ansible.builtin.command:
        cmd: dnf install -y python3
      register: python3_install
      changed_when: "'already installed' not in python3_install.stdout"

    # ── SSH Key Trust (Bidirectional) ──────────────────────────────────
    # Maestro requires passwordless SSH between all nodes in BOTH directions.
    # A shared keypair is pre-generated by Terraform and stored in SSM Parameter Store.
    # Every node retrieves and installs the same keypair, enabling any-to-any SSH as root.

    - name: Install shared SSH keypair
      block:
        - name: Ensure .ssh directory exists
          ansible.builtin.file:
            path: /root/.ssh
            state: directory
            mode: '0700'

        - name: Retrieve shared public key from SSM
          ansible.builtin.command:
            cmd: >
              /usr/local/bin/aws ssm get-parameter
              --name "/{{ deploy_namespace }}/archpacs/{{ deployment_name }}/ssh-pubkey"
              --query "Parameter.Value"
              --output text
              --region {{ aws_region }}
          register: ssm_pub_key
          retries: 6
          delay: 10
          until: ssm_pub_key.rc == 0

        - name: Retrieve shared private key from SSM
          ansible.builtin.command:
            cmd: >
              /usr/local/bin/aws ssm get-parameter
              --name "/{{ deploy_namespace }}/archpacs/{{ deployment_name }}/ssh-privkey"
              --query "Parameter.Value"
              --output text
              --with-decryption
              --region {{ aws_region }}
          register: ssm_priv_key
          retries: 6
          delay: 10
          until: ssm_priv_key.rc == 0
          # no_log: true  # Disabled for dev debugging

        - name: Deploy shared private key
          ansible.builtin.copy:
            content: "{{ ssm_priv_key.stdout }}\n"
            dest: "{{ ssh_key_path }}"
            mode: '0600'
          # no_log: true  # Disabled for dev debugging

        - name: Deploy shared public key
          ansible.builtin.copy:
            content: "{{ ssm_pub_key.stdout }}\n"
            dest: "{{ ssh_key_path }}.pub"
            mode: '0644'

        - name: Add shared key to authorized_keys
          ansible.builtin.lineinfile:
            path: /root/.ssh/authorized_keys
            line: "{{ ssm_pub_key.stdout }}"
            create: yes
            mode: '0600'

        - name: Configure SSH to skip host key checking for fleet
          ansible.builtin.copy:
            content: |
              Host *
                StrictHostKeyChecking no
                UserKnownHostsFile /dev/null
            dest: /root/.ssh/config
            mode: '0600'

    # ── Orchestrator: Fleet Discovery & Setup ──────────────────────────
    # The orchestrator discovers all instances in this deployment using EC2 tags,
    # builds /etc/hosts for name resolution, generates distribute.cfg,
    # installs Maestro on all nodes, and runs new_site_install.

    - name: Orchestrator setup and Maestro install
      when: is_orchestrator | bool
      block:
        - name: Discover fleet instances via EC2 tags
          ansible.builtin.command:
            cmd: >
              /usr/local/bin/aws ec2 describe-instances
              --filters
                "Name=tag:Namespace,Values={{ deploy_namespace }}"
                "Name=tag:Class,Values={{ deployment_name }}-*"
                "Name=instance-state-name,Values=running"
              --query "Reservations[].Instances[].{InstanceId:InstanceId,PrivateIp:PrivateIpAddress,PrivateDns:PrivateDnsName,Class:Tags[?Key=='Class']|[0].Value,Tenant:Tags[?Key=='Tenant']|[0].Value,ServerType:Tags[?Key=='ServerType']|[0].Value,MaestroRole:Tags[?Key=='MaestroRole']|[0].Value}"
              --output json
              --region {{ aws_region }}
          register: fleet_discovery

        - name: Parse fleet data
          ansible.builtin.set_fact:
            fleet_instances_raw: "{{ fleet_discovery.stdout | from_json }}"

        - name: Filter to instances with ServerType tag (exclude stale instances)
          ansible.builtin.set_fact:
            fleet_instances: "{{ fleet_instances_raw | selectattr('ServerType', 'defined') | selectattr('ServerType', 'ne', None) | selectattr('ServerType', 'ne', '') | list }}"

        - name: Display discovered fleet
          ansible.builtin.debug:
            msg: "Found {{ fleet_instances | length }} instance(s) with ServerType ({{ fleet_instances_raw | length }} total): {{ fleet_instances | map(attribute='Class') | list }}"

        - name: Build /etc/hosts entries for fleet
          ansible.builtin.lineinfile:
            path: /etc/hosts
            line: "{{ item.PrivateIp }}  {{ item.PrivateDns }}"
            regexp: ".*{{ item.PrivateDns }}$"
          loop: "{{ fleet_instances }}"

        - name: Derive PACS branch from version (e.g., 5-8-1-R32 -> PACS-5-8-1)
          ansible.builtin.set_fact:
            pacs_branch: "PACS-{{ pacs_version | regex_replace('-R[0-9]+$', '') }}"

        - name: Generate distribute.cfg from discovered fleet
          ansible.builtin.copy:
            content: |
              [ClientInfo]
              clientCode                               = {{ tenant | upper }}
              clientID                                 = 1

              [DeploymentInfo]
              PacsVersion                              = {{ pacs_branch }}

              [SiteInfo]
              DefaultTimeZone                          = America/Toronto

              [HOSTLIST]
              {% for inst in fleet_instances %}
              {% set st = inst.ServerType | default('Feature_Base') %}
              {% if inst.MaestroRole | default('') == 'orchestrator' %}
              {{ "%-40s" | format(inst.PrivateDns) }}= {{ st }}, DistributionServer
              {% else %}
              {{ "%-40s" | format(inst.PrivateDns) }}= {{ st }}
              {% endif %}
              {% endfor %}

              [ServerType]
              {% for st_name, features in server_type_features.items() %}
              {{ "%-40s" | format(st_name) }}= {{ features }}
              {% endfor %}

              [ServerNumberMap]
              {% for inst in fleet_instances %}
              {{ "%-40s" | format(inst.PrivateDns) }}= {{ loop.index }}
              {% endfor %}
            dest: "{{ distribute_cfg_path }}"
            mode: '0644'

        - name: Display generated distribute.cfg
          ansible.builtin.command:
            cmd: cat {{ distribute_cfg_path }}
          register: distribute_cfg_content

        - name: Show distribute.cfg
          ansible.builtin.debug:
            var: distribute_cfg_content.stdout_lines

        # ── Maestro Installation (from orchestrator to all nodes) ──────
        # Bypasses the official install script (which requires PKI certs for the
        # sidemodule repo) by downloading the RPM directly from Artifactory.
        # Replicates the logic from maestro-installation/bin/install:
        #   1. Download RPM to orchestrator
        #   2. yum localinstall on orchestrator
        #   3. SCP + yum localinstall on each runner
        #   4. Install python2.7-vendor on all nodes

        - name: Check if Maestro is already installed
          ansible.builtin.stat:
            path: "{{ maestro_installed_marker }}"
          register: maestro_check

        - name: Install Maestro on all nodes
          when: not maestro_check.stat.exists
          block:
            - name: Download Maestro RPM from S3
              ansible.builtin.command:
                cmd: >
                  /usr/local/bin/aws s3 cp
                  s3://{{ playbooks_bucket }}/ansible-uploads/maestro-bootstrap/{{ maestro_rpm_filename }}
                  /tmp/{{ maestro_rpm_filename }}
                  --region {{ aws_region }}
              register: maestro_download
              retries: 3
              delay: 10
              until: maestro_download.rc == 0

            - name: Install Maestro RPM on orchestrator
              ansible.builtin.command:
                cmd: yum -y --nogpgcheck localinstall /tmp/{{ maestro_rpm_filename }}
              register: maestro_local_install

            - name: Display orchestrator install result
              ansible.builtin.debug:
                var: maestro_local_install.stdout_lines

            - name: Identify runner nodes
              ansible.builtin.set_fact:
                runner_instances: "{{ fleet_instances | rejectattr('MaestroRole', 'equalto', 'orchestrator') | list }}"

            - name: Wait for SSH connectivity to runner nodes
              ansible.builtin.command:
                cmd: ssh -o ConnectTimeout=10 root@{{ item.PrivateDns }} "echo ok"
              loop: "{{ runner_instances }}"
              retries: 12
              delay: 15
              until: ssh_check.rc == 0
              register: ssh_check

            - name: Copy Maestro RPM to runner nodes via SCP
              ansible.builtin.command:
                cmd: scp /tmp/{{ maestro_rpm_filename }} root@{{ item.PrivateDns }}:/tmp/{{ maestro_rpm_filename }}
              loop: "{{ runner_instances }}"

            - name: Install Maestro RPM on runner nodes
              ansible.builtin.command:
                cmd: ssh root@{{ item.PrivateDns }} "yum -y --nogpgcheck localinstall /tmp/{{ maestro_rpm_filename }}"
              loop: "{{ runner_instances }}"

            - name: Install python2.7-vendor on orchestrator
              ansible.builtin.command:
                cmd: bash {{ maestro_base_dir }}/python2.7-rpm/install_python2.7-vendor.sh

            - name: Install python2.7-vendor on runner nodes
              ansible.builtin.command:
                cmd: ssh root@{{ item.PrivateDns }} "bash {{ maestro_base_dir }}/python2.7-rpm/install_python2.7-vendor.sh"
              loop: "{{ runner_instances }}"

            - name: Clean up RPM from /tmp
              ansible.builtin.file:
                path: /tmp/{{ maestro_rpm_filename }}
                state: absent

            - name: Mark Maestro as installed
              ansible.builtin.copy:
                content: |
                  Maestro installed: {{ ansible_date_time.iso8601 }}
                  Host: {{ ansible_hostname }}
                  Server Type: {{ server_type }}
                  RPM: {{ maestro_rpm_filename }}
                dest: "{{ maestro_installed_marker }}"
                mode: '0644'

        # ── Run new_site_install ───────────────────────────────────────
        # Per Confluence: https://example.atlassian.net/wiki/spaces/SREL/pages/2485649696

        - name: Retrieve deploy password from SSM
          ansible.builtin.command:
            cmd: >
              /usr/local/bin/aws ssm get-parameter
              --name "/{{ deploy_namespace }}/archpacs/{{ deployment_name }}/maestro-deploy-password"
              --query "Parameter.Value"
              --output text
              --with-decryption
              --region {{ aws_region }}
          register: deploy_password
          # no_log: true  # Disabled for dev debugging

        - name: Check if PACS is already installed
          ansible.builtin.stat:
            path: "{{ pacs_installed_marker }}"
          register: pacs_check

        - name: Execute Maestro new_site_install recipe
          ansible.builtin.command:
            cmd: >
              {{ maestro_bin_dir }}/orchestrator new_site_install.yml
              --distribute-cfg {{ distribute_cfg_path }}
              --remove-state
              --no-distro-check
              --no-screen-check
              --exit-on-completion
              --no-state-exports
              -r adm_pass={{ deploy_password.stdout }}
              -r pacs_version={{ pacs_version }}
              -r iv_version={{ pacs_version }}
              -r sa_pass={{ deploy_password.stdout }}
          environment:
            MAESTRO_SSH_USERNAME: root
          register: maestro_result
          when: not pacs_check.stat.exists
          timeout: 7200
          # no_log: true  # Disabled for dev debugging

        - name: Mark PACS as installed
          ansible.builtin.copy:
            content: |
              PACS installed: {{ ansible_date_time.iso8601 }}
              Host: {{ ansible_hostname }}
              PACS Version: {{ pacs_version }}
              Server Type: {{ server_type }}
              Maestro exit code: {{ maestro_result.rc | default('skipped') }}
            dest: "{{ pacs_installed_marker }}"
            mode: '0644'
          when: maestro_result is changed and maestro_result.rc == 0

    # ── Deployment Status ───────────────────────────────────────────────

    - name: Create deployment status marker
      ansible.builtin.copy:
        content: |
          ArchPACS Maestro Bootstrap
          Host: {{ ansible_hostname }}
          Server Type: {{ server_type }}
          Orchestrator: {{ is_orchestrator }}
          PACS Version: {{ pacs_version }}
          Deployment: {{ deployment_name }}
          Tenant: {{ tenant }}
          Namespace: {{ deploy_namespace }}
          Last Run: {{ ansible_date_time.iso8601 }}
        dest: /var/log/archpacs-deployment.txt
        mode: '0644'
